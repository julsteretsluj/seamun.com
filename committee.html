<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Committee — SEAMUN I</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/seamun-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo">
          <img class="logo-image" src="assets/seamun-logo.png" alt="SEAMUN I" />
          <span class="logo-text">SEAMUN I</span>
        </a>
        <nav class="nav">
          <a href="about.html">About</a>
          <a href="leadership.html">Leadership</a>
          <a href="committees.html">Committees</a>
          <a href="index.html#schedule">Schedule</a>
          <a href="forms.html">Forms</a>
          <a href="contact.html">Contact</a>
          <a href="sponsors.html">Sponsors</a>
          <a class="btn btn-header" href="forms.html">Register</a>
        </nav>
        <button class="nav-toggle" type="button" aria-label="Open menu" data-nav-toggle></button>
      </div>
      <div class="nav-dropdown" id="nav-dropdown" hidden>
        <a href="about.html">About</a>
        <a href="leadership.html">Leadership</a>
        <a href="committees.html">Committees</a>
        <a href="index.html#schedule">Schedule</a>
        <a href="forms.html">Forms</a>
        <a href="contact.html">Contact</a>
        <a href="sponsors.html">Sponsors</a>
        <a href="forms.html">Register</a>
      </div>
    </header>

    <main>
      <section class="section section-alt">
        <div class="container">
          <p class="committee-back-wrap">
            <a href="committees.html" class="committee-back">← All committees</a>
          </p>
          <div id="committee-content"></div>
          <p class="committee-back-wrap" style="margin-top: 1.5rem;">
            <a href="committees.html" class="committee-back">← All committees</a>
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <img class="footer-logo" src="assets/seamun-logo.png" alt="" />
        <p class="footer-tagline">SEAMUN I — Policies with a Purpose</p>
        <p class="footer-copy">&copy; SEAMUN I 2027</p>
      </div>
    </footer>

    <script src="scripts/committee-logos.js"></script>
    <script src="scripts/committee-data.js"></script>
    <script src="scripts/committee-info.js"></script>
    <script>
      (function () {
        var navToggle = document.querySelector("[data-nav-toggle]");
        var dropdown = document.getElementById("nav-dropdown");
        if (navToggle && dropdown) {
          navToggle.addEventListener("click", function () {
            var open = dropdown.hasAttribute("hidden");
            if (open) dropdown.removeAttribute("hidden");
            else dropdown.setAttribute("hidden", "");
            navToggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
          });
        }

        var params = new URLSearchParams(window.location.search);
        var id = (params.get("c") || "").toLowerCase().trim();
        var content = document.getElementById("committee-content");

        var LOGOS = window.SEAMUNCommitteeLogos || {};
        var LOGO_IS_FULL = { ecosoc: true, press: true, unhrc: true, unodc: true, unsc: true, unwomen: true, disec: true, fwc: true, interpol: true, who: true };
        var COMMITTEE_META = {
          ecosoc: { name: "ECOSOC", fullName: "Economic and Social Council", type: "Traditional", grades: "7–12", metaLabel: "Chairs" },
          press: { name: "Press Corps", fullName: "Media", type: "Specialized", grades: "7–12", metaLabel: "Editors" },
          unhrc: { name: "UNHRC", fullName: "United Nations Human Rights Council", type: "Traditional", grades: "9–12", metaLabel: "Chairs" },
          unodc: { name: "UNODC", fullName: "United Nations Office on Drugs and Crime", type: "Specialized", grades: "9–12", metaLabel: "Chairs" },
          unsc: { name: "UNSC (CRISIS)", fullName: "United Nations Security Council", type: "Traditional", grades: "7–12", metaLabel: "Chairs" },
          unwomen: { name: "UN Women", fullName: "United Nations Entity for Gender Equality and the Empowerment of Women", type: "Specialized", grades: "9–12", metaLabel: "Chairs" },
          disec: { name: "DISEC", fullName: "Disarmament and International Security Committee", type: "Traditional", grades: "7–12", metaLabel: "Chairs" },
          fwc: { name: "FWC (CRISIS)", fullName: "Fantasy World Committee", type: "Fantasy", grades: "9–12", metaLabel: "Chairs" },
          interpol: { name: "Interpol", fullName: "International Criminal Police Organization", type: "Specialized", grades: "9–12", metaLabel: "Chairs" },
          who: { name: "WHO", fullName: "World Health Organization", type: "Specialized", grades: "9–12", metaLabel: "Chairs" }
        };
        var matrix = window.SEAMUNCommitteeData || {};
        var COMMITTEES = {};
        Object.keys(COMMITTEE_META).forEach(function (key) {
          var meta = COMMITTEE_META[key];
          var data = matrix[key] || {};
          COMMITTEES[key] = {
            name: meta.name,
            fullName: meta.fullName,
            type: meta.type,
            grades: meta.grades,
            metaLabel: meta.metaLabel,
            chairs: String(data.chairs != null ? data.chairs : ""),
            delegates: String(data.delegates != null ? data.delegates : ""),
            topics: data.topics || [],
            topicNote: null,
            allocations: data.allocations || []
          };
        });

        if (!id || !COMMITTEES[id]) {
          window.location.href = "committees.html";
          return;
        }

        var c = COMMITTEES[id];
        document.title = c.name + " — SEAMUN I";
        var emblemClass = "committee-card-emblem-img" + (LOGO_IS_FULL[id] ? " committee-card-emblem-full" : "");
        var emblem = LOGOS[id] ? '<div class="committee-card-emblem"><img src="' + LOGOS[id] + '" alt="" class="' + emblemClass + '" /></div>' : '';

        var html = '<article class="committee-card committee-card-single committee-card-' + id + '" data-committee="' + id + '">';
        html += emblem;
        html += '<div class="committee-card-body">';
        html += '<div class="committee-header"><div class="committee-name-wrap"><h2 class="committee-single-title">' + c.name + '</h2> <p class="committee-type">' + c.fullName + '</p></div>';
        html += '<div class="committee-tags"><span class="tag">' + c.type + '</span><span class="tag">' + c.grades + '</span></div></div>';
        html += '<div class="committee-meta"><span>' + c.chairs + ' ' + c.metaLabel + '</span><span>' + c.delegates + ' Delegates</span><span>Grades ' + c.grades + '</span></div>';

        if (c.fwcUniverse) {
          html += '<ul class="committee-topics"><li class="universe-item"><div class="universe-title">' + c.fwcUniverse.title + '</div>';
          c.fwcUniverse.lines.forEach(function (line) {
            html += '<div class="topic-line"><span class="topic-emoji">' + line.emoji + '</span> ' + line.text + '</div>';
          });
          html += '</li></ul>';
        } else if (c.topics.length) {
          html += '<ul class="committee-topics">';
          c.topics.forEach(function (t) {
            html += '<li><span class="topic-emoji">' + t.emoji + '</span><span>' + t.text + '</span><span class="difficulty-tag">' + t.diff + '</span></li>';
          });
          html += '</ul>';
        }

        if (c.topicNote) html += '<p class="committee-topic-note">' + c.topicNote + '</p>';
        html += '<details class="committee-allocations" open><summary>Allocations</summary><ul class="allocation-list">';
        (c.allocations.length ? c.allocations : ["Allocations to be announced."]).forEach(function (item) {
          html += '<li>' + item + '</li>';
        });
        html += '</ul></details></div></article>';
        content.innerHTML = html;
        if (window.SEAMUNCommitteeInfo) {
          var card = content.querySelector(".committee-card[data-committee]");
          if (card) window.SEAMUNCommitteeInfo.attachToCard(card, id);
        }
      })();
    </script>
  </body>
</html>
